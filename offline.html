<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#176b87" />
    <title>오프라인 | 서울정형외과</title>
    <style>
      :root {
        --ink: #102033;
        --muted: #607084;
        --primary: #176b87;
        --soft: #eef9f8;
        --line: #d9e7ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background: linear-gradient(135deg, #ffffff, #e5f7f8);
        font-family:
          "Noto Sans KR",
          "Apple SD Gothic Neo",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 520px);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(16, 32, 51, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 8vw, 44px);
        line-height: 1.1;
        letter-spacing: -0.05em;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        margin-top: 12px;
        padding: 0 18px;
        border-radius: 999px;
        color: white;
        font-weight: 800;
        text-decoration: none;
        background: var(--primary);
      }
    </style>
  </head>
  <body>
    <main>
      <p>SEOUL ORTHOPEDIC CLINIC</p>
      <h1>현재 오프라인 상태입니다.</h1>
      <p>
        인터넷 연결이 복구되면 서울정형외과 웹앱을 다시 이용하실 수 있습니다.
        긴급 문의는 대표 전화로 연락해 주세요.
      </p>
      <a href="tel:0555458275">055-545-8275 전화하기</a>
    </main>
  </body>
</html>
